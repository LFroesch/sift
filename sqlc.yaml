# Specify what version, 2 is the industry standard, 1 is legacy
version: "2"
sql:
# This Configures the SQL settings
# Look in sql/schema directory for schema structure (ignores "downs")
  - schema: "sql/schema"
  # Look in the sql/queries directory for queries
    queries: "sql/queries"
    # Which engine to use
    engine: "postgresql"
    # Generate Go code in the internal/database directory
    gen:
      go:
        out: "internal/database"
        emit_json_tags: true
        overrides:
          - db_type: "timestamptz"
            nullable: true
            go_type:
              import: "time"
              type: "Time"
              pointer: true
          - db_type: "timestamp"
            nullable: true
            go_type:
              import: "time"
              type: "Time"
              pointer: true
          - db_type: "pg_catalog.timestamp"
            nullable: true
            go_type:
              import: "time"
              type: "Time"
              pointer: true
          - db_type: "text"
            nullable: true
            go_type:
              type: "string"
              pointer: true